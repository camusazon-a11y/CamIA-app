const VideoPlayer = ({prompt,duration,hasWatermark})=>{
  const [frame,setFrame]=useState(0);
  const [frames,setFrames]=useState([]);
  useEffect(()=>{
    const n=duration==="10s"?4:duration==="20s"?6:8;
    const vars=["ultra realistic cinematic","different angle dramatic","close up detailed","wide shot aerial","golden hour lighting","blue hour","motion blur","atmospheric"];
    setFrames(vars.slice(0,n).map((v,i)=>imgUrl(`${prompt}, ${v}`,10000+i*3333)));
  },[prompt,duration]);
  useEffect(()=>{
    if(!frames.length) return;
    const ms={"10s":2500,"20s":3333,"30s":3750}[duration]||2500;
    const t=setInterval(()=>setFrame(f=>(f+1)%frames.length),ms);
    return ()=>clearInterval(t);
  },[frames,duration]);
  return(
    <div style={{position:"relative",borderRadius:14,overflow:"hidden",background:"#000",maxWidth:380,width:"100%"}}>
      {frames.length>0
        ?<img src={frames[frame]} alt="" style={{width:"100%",height:220,objectFit:"cover",display:"block",transition:"opacity 0.4s"}} onError={e=>{e.target.src="https://via.placeholder.com/380x220/06060f/e94560?text=Génération...";}}/>

                  <div>
                    <div style={{color:"#fff",fontSize:12,fontFamily:"Helvetica,sans-serif",fontWeight:"bold"}}>{msg.prompt}</div>
                    <div style={{color:"#2a2a2a",fontSize:9,fontFamily:"Helvetica,sans-serif",letterSpacing:1}}>CAMIA MUSIC 🇧🇯</div>
                  </div>
                </div>
                <audio controls style={{width:"100%",borderRadius:8}}><source src={msg.url} type="audio/mp3"/></audio>
              </div>
            ):msg.type==="video"?(
              <div style={{maxWidth:"88%"}}>
                <div style={{fontSize:9,color:"#2a2a2a",fontFamily:"Helvetica,sans-serif",marginBottom:5,fontStyle:"italic",letterSpacing:1}}>🎬 VIDÉO IA · {VIDEO_LABELS[msg.duration]?.toUpperCase()} {msg.hasWatermark?"· 🏷️ WATERMARK":""}</div>
                <VideoPlayer prompt={msg.prompt} duration={msg.duration} hasWatermark={msg.hasWatermark}/>
              </div>
            ):(
              <div style={{maxWidth:"78%",padding:"12px 16px",borderRadius:msg.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
                background:msg.role==="user"?"linear-gradient(135deg,#e94560,#c9184a)":"linear-gradient(135deg,rgba(20,8,15,0.9),rgba(10,5,12,0.95))",
                border:msg.role==="user"?"none":"1px solid rgba(233,69,96,0.1)",
                color:msg.role==="user"?"#fff":C.text,fontSize:13,lineHeight:1.7,
                fontFamily:msg.role==="user"?"Helvetica,sans-serif":"Georgia,serif",
                boxShadow:msg.role==="user"?"0 6px 24px rgba(233,69,96,0.28)":"0 4px 16px rgba(0,0,0,0.25)"}}
                dangerouslySetInnerHTML={{__html:fmt(msg.content)}}/>
            )}
            {msg.role==="user"&&<div style={{width:30,height:30,minWidth:30,background:"linear-gradient(135deg,#1a1a2e,#0d0d1a)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,border:"1px solid rgba(255,255,255,0.05)",flexShrink:0}}>😎</div>}
          </div>
        ))}
        {loading&&(
          <div className="msg" style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{width:30,height:30,borderRadius:"50%",overflow:"hidden"}}><Logo size={30}/></div>
            <div style={{padding:"12px 18px",background:"linear-gradient(135deg,rgba(20,8,15,0.9),rgba(10,5,12,0.95))",border:"1px solid rgba(233,69,96,0.1)",borderRadius:"18px 18px 18px 4px",display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(j=><div key={j} className="dot" style={{width:7,height:7,background:C.red,borderRadius:"50%"}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* INPUT */}
      <div style={{width:"100%",maxWidth:740,padding:"10px 18px 18px",borderTop:"1px solid rgba(233,69,96,0.07)",background:"rgba(6,6,15,0.94)",backdropFilter:"blur(20px)",position:"relative",zIndex:10}}>
        <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
          {suggestions[tab].map(s=>(
            <button key={s} className="chip" onClick={()=>setInput(s)} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:20,padding:"4px 11px",color:"#2a2a2a",fontSize:10,fontFamily:"Helvetica,sans-serif",cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>{s}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:10,alignItems:"flex-end",background:"linear-gradient(135deg,rgba(20,8,15,0.85),rgba(10,5,12,0.92))",border:`1px solid ${C.border}`,borderRadius:18,padding:"12px 14px",boxShadow:"0 4px 24px rgba(0,0,0,0.4)"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
            placeholder={tab==="video"?`🎬 Décris ta vidéo ${VIDEO_LABELS[videoDuration]}...`:tab==="music"?"🎵 Décris ta musique...":tab==="image"?"🎨 Décris ton image...":"Pose ta question à CamIA..."}
            rows={1} style={{flex:1,background:"none",border:"none",color:"#ddd",fontSize:13,resize:"none",fontFamily:"Helvetica,sans-serif",lineHeight:1.6,maxHeight:100,overflowY:"auto"}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}/>
          <button className="send-btn" onClick={sendMessage} disabled={loading||!input.trim()||accountBlocked} style={{width:42,height:42,minWidth:42,background:loading||!input.trim()?"#0e0e0e":`linear-gradient(135deg,${C.red},#c9184a)`,border:"none",borderRadius:12,cursor:loading||!input.trim()?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"all 0.2s",boxShadow:!loading&&input.trim()?`0 4px 16px rgba(233,69,96,0.5)`:"none"}}>
            {loading?<div style={{width:16,height:16,border:"2px solid #222",borderTopColor:C.red,borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>:"➤"}
          </button>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginTop:7,gap:8}}>
          <div style={{height:1,flex:1,background:"linear-gradient(90deg,transparent,rgba(233,69,96,0.07),transparent)"}}/>
          <span style={{fontSize:9,color:"#111",fontFamily:"Helvetica,sans-serif",letterSpacing:2}}>CAMIA · CAMUS AZON · BÉNIN 🇧🇯</span>
          <div style={{height:1,flex:1,background:"linear-gradient(90deg,transparent,rgba(233,69,96,0.07),transparent)"}}/>
        </div>
      </div>

      {/* PAYMENT MODAL */}
      {showPayment&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(10px)"}}>
          <div className="modal" style={{background:"linear-gradient(135deg,#0e0718,#07040e)",border:"1px solid rgba(233,69,96,0.22)",borderRadius:24,padding:24,width:"100%",maxWidth:400,boxShadow:"0 30px 80px rgba(0,0,0,0.8)",maxHeight:"92vh",overflowY:"auto"}}>
            {!paySuccess?(
              <>
                <div style={{textAlign:"center",marginBottom:20}}>
                  <div style={{fontSize:36,marginBottom:7}}>{payFor?.type==="video"?"🎬":"🎵"}</div>
                  <div style={{color:"#fff",fontSize:15,fontWeight:"bold",fontFamily:"Georgia,serif",marginBottom:6}}>{payFor?.type==="video"?`Vidéo ${payFor.duration}`:"Musique IA"}</div>
                  <div style={{display:"inline-block",background:"rgba(244,196,48,0.1)",border:"1px solid rgba(244,196,48,0.3)",borderRadius:20,padding:"5px 18px"}}>
                    <span style={{color:C.gold,fontSize:19,fontWeight:"bold",fontFamily:"Helvetica,sans-serif"}}>{payFor?.type==="video"?VIDEO_PRICES[payFor.duration]?.toLocaleString():"500"} FCFA</span>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                  {[{id:"mtn",label:"MTN MoMo",sub:"*880#",color:C.mtn,textColor:"#000",icon:"M"},{id:"moov",label:"Moov Money",sub:"*555#",color:C.moov,textColor:"#fff",icon:"Mo"}].map(m=>(
                    <button key={m.id} onClick={()=>setPayMethod(m.id)} style={{padding:"12px 8px",background:payMethod===m.id?`rgba(${m.id==="mtn"?"255,204,0":"0,153,255"},0.1)`:"rgba(255,255,255,0.03)",border:`1px solid ${payMethod===m.id?m.color:"rgba(255,255,255,0.05)"}`,borderRadius:12,cursor:"pointer",transition:"all 0.2s",textAlign:"center"}}>
                      <div style={{width:30,height:30,background:m.color,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold",color:m.textColor,margin:"0 auto 5px"}}>{m.icon}</div>
                      <div style={{color:payMethod===m.id?m.color:"#444",fontFamily:"Helvetica,sans-serif",fontSize:11,fontWeight:"bold"}}>{m.label}</div>
                      <div style={{color:"#2a2a2a",fontFamily:"Helvetica,sans-serif",fontSize:9}}>{m.sub}</div>
                    </button>
                  ))}
                </div>
                <div style={{background:payMethod==="mtn"?"rgba(255,204,0,0.05)":"rgba(0,153,255,0.05)",border:`1px solid ${payMethod==="mtn"?"rgba(255,204,0,0.2)":"rgba(0,153,255,0.2)"}`,borderRadius:14,padding:16,marginBottom:16}}>
                  {[`Compose le ${payMethod==="mtn"?"*880#":"*555#"}`,"Choisis → Envoyer de l'argent",payMethod==="mtn"?MTN_NUMBER:MOOV_NUMBER,`Envoie ${payFor?.type==="video"?VIDEO_PRICES[payFor.duration]?.toLocaleString():"500"} FCFA`,"Copie le code de ton SMS"].map((step,idx)=>(
                    <div key={idx} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:idx<4?9:0}}>
                      <div style={{width:22,height:22,minWidth:22,background:payMethod==="mtn"?"rgba(255,204,0,0.15)":"rgba(0,153,255,0.15)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:"bold",color:payMethod==="mtn"?C.mtn:C.moov,fontFamily:"Helvetica,sans-serif"}}>{idx+1}</div>
                      <div style={{color:idx===2?"#fff":C.text,fontSize:12,fontFamily:"Helvetica,sans-serif",lineHeight:1.5,fontWeight:idx===2?"bold":"normal"}}>
                        {idx===2?<><span style={{color:payMethod==="mtn"?C.mtn:C.moov,fontSize:15,letterSpacing:1}}>{payMethod==="mtn"?MTN_NUMBER:MOOV_NUMBER}</span><br/><span style={{color:"#2a2a2a",fontSize:9}}>Camus Azon · CamIA</span></>:step}
                      </div>
                    </div>
                  ))}
                </div>
                <input value={payCode} onChange={e=>{setPayCode(e.target.value);setPayError("");}} placeholder="Code de transaction"
                  style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${payError?C.red:"rgba(255,255,255,0.05)"}`,borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:12,fontFamily:"Helvetica,sans-serif",boxSizing:"border-box",marginBottom:6,transition:"all 0.2s"}}/>
                {payError&&<div style={{color:C.red,fontSize:10,fontFamily:"Helvetica,sans-serif",marginBottom:10}}>⚠️ {payError}</div>}
                <button onClick={verifyPayment} disabled={payLoading} style={{width:"100%",padding:"13px 0",background:payLoading?"#0e0e0e":payMethod==="mtn"?"linear-gradient(135deg,#FFCC00,#e6b800)":"linear-gradient(135deg,#0099ff,#0073cc)",border:"none",borderRadius:14,color:payLoading?"#333":payMethod==="mtn"?"#000":"#fff",fontFamily:"Helvetica,sans-serif",fontSize:13,fontWeight:"bold",cursor:payLoading?"not-allowed":"pointer",letterSpacing:1,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:payLoading?"none":payMethod==="mtn"?"0 6px 20px rgba(255,204,0,0.25)":"0 6px 20px rgba(0,153,255,0.25)"}}>
                  {payLoading?<><div style={{width:16,height:16,border:`2px solid ${payMethod==="mtn"?"rgba(0,0,0,0.2)":"rgba(255,255,255,0.2)"}`,borderTopColor:payMethod==="mtn"?"#000":"#fff",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/> Vérification...</>:"✅ Valider le paiement"}
                </button>
                <button onClick={()=>{setShowPayment(false);setPayError("");setPayCode("");setPayFor(null);}} style={{width:"100%",padding:"10px 0",background:"none",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,color:"#2a2a2a",fontFamily:"Helvetica,sans-serif",fontSize:11,cursor:"pointer"}}>Annuler</button>
              </>
            ):(
              <div className="success-pop" style={{textAlign:"center",padding:"28px 0"}}>
                <div style={{fontSize:58,marginBottom:12,animation:"float 1s ease-in-out infinite alternate"}}>🎉</div>
                <div style={{color:C.green,fontSize:18,fontWeight:"bold",fontFamily:"Helvetica,sans-serif",marginBottom:5}}>Paiement validé !</div>
                <div style={{color:"#333",fontSize:12,fontFamily:"Helvetica,sans-serif"}}>{payFor?.type==="video"?"🎬 Génération vidéo en cours...":"🎵 Génération musicale en cours..."}</div>
                {notifGranted&&<div style={{color:"#2a2a2a",fontSize:10,fontFamily:"Helvetica,sans-serif",marginTop:8}}>🔔 Notification dès que c'est prêt</div>}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
